[alias]

# --- Quality Control ---
# Runs Clippy with all features and targets, treating warnings as errors
checkall = "clippy --all-targets --all-features -- -D warnings"
# Formats all crates in the workspace
fmt_all = "fmt --all"
# Checks if all code follows the formatting guidelines without applying changes
fmt_checkall = "fmt --check --all"

# --- Testing ---
# Runs all workspace tests via cargo-nextest (see .config/nextest.toml)
tall = "nextest run --workspace --all-features"
# Lists tests without running them
tlist = "nextest list --workspace --all-features"
# Libtest harness fallback (e.g. if nextest is unavailable)
tall-libtest = "test --workspace --all-features"

# --- Build Execution ---
# Standard optimized release build
buildrelease = "build --release"
# Build focused on minimum binary size (uses the release-min-size profile)
buildminified = "build --profile release-min-size"
# Build with release optimizations but keeping debug symbols for profiling
builddebug = "build --profile release-with-debug"

# --- Utilities ---
# Force a clean state and run a full check (useful if the compiler gets confused)
refresh = ["clean", "checkall"]